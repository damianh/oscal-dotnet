name: ci

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@3951f0dfe7a07e2313ec93c75700083e2005cbab # v4.3.0
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore oscal-dotnet.slnx

    - name: Build
      run: dotnet build oscal-dotnet.slnx --no-restore --configuration Release

    - name: Run tests
      run: |
        dotnet run --project test/Oscal.Tests/Oscal.Tests.csproj --no-build --configuration Release

    - name: Pack NuGet packages
      run: dotnet pack oscal-dotnet.slnx --no-build --configuration Release --output ./packages

    - name: Upload NuGet packages
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: nuget-packages
        path: ./packages/*.nupkg

    - name: Add build summary
      if: success()
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "✅ Build completed" >> $GITHUB_STEP_SUMMARY
        echo "✅ Tests executed" >> $GITHUB_STEP_SUMMARY
        echo "✅ NuGet packages created" >> $GITHUB_STEP_SUMMARY
